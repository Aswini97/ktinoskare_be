version: '3.8'

services:
  # 1. Reverse Proxy Gateway (Nginx Router)
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Centralized Spatial-Temporal Database Engine (PostgreSQL + PostGIS + TimescaleDB)
  db:
    image: timescale/timescaledb-ha:pg15-oss
    container_name: spatial_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ktinoscare_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_secure_password
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 600M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Enterprise Message Broker Ingestion Layer (EMQX Broker)
  mqtt:
    image: emqx/emqx:5.7.0
    container_name: emqx_broker
    user: "root" 
    restart: always
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    deploy:
      resources:
        limits:
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Asynchronous Background Ingestion MQTT Worker
  mqtt_worker:
    build: .
    container_name: mqtt_worker
    restart: always
    command: python telemetry/mqtt_consumer.py
    depends_on:
      - db
      - redis
      - mqtt
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/ktinoscare_db
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=ktinoscare.settings
      - MQTT_BROKER_HOST=mqtt
      - MQTT_BROKER_PORT=1883
      - MQTT_TELEMETRY_TOPIC=ktinoscare/device/+/telemetry
    deploy:
      resources:
        limits:
          memory: 250M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. Distributed Cache / Channels Backend (Redis Conveyor Belt)
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 6. Core Django Server Base (Daphne Application Server)
  web:
    build: .
    container_name: ktinoscare_api
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 ktinoscare.asgi:application
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mqtt
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/ktinoscare_db
      - DJANGO_SECRET_KEY=django-insecure-your-hardcoded-fallback-secret-key-here
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,d3dhvkckoyx2k8.cloudfront.net
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,https://d3dhvkckoyx2k8.cloudfront.net
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://localhost:3000,http://localhost:5173,https://d3dhvkckoyx2k8.cloudfront.net
      - REDIS_URL=redis://redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=ktinoscare.settings
      - AWS_ACCESS_KEY_ID=mock_local_key
      - AWS_SECRET_ACCESS_KEY=mock_local_secret
      - AWS_STORAGE_BUCKET_NAME=ktinoscare-telemetry-bucket
    deploy:
      resources:
        limits:
          memory: 350M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 7. Database Graphical Administration Console
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@ktinoscare.com
      - PGADMIN_DEFAULT_PASSWORD=your_secure_password
      - PGADMIN_LISTEN_PORT=80
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 150M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  emqx_data:
  emqx_log: