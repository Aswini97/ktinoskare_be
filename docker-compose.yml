services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=cattle_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_secure_password

  mqtt:
    image: eclipse-mosquitto:latest
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  mqtt_worker:
    build: .
    # Add volume so live-reload/code updates work here too
    volumes:
      - .:/app
    command: python telemetry/mqtt_consumer.py
    restart: always
    depends_on:
      - db
      - mqtt
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/cattle_db
      - PYTHONUNBUFFERED=1 # Crucial for seeing MQTT logs in 'docker logs'

  web:
    build: .
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "80:8000" # Changed to 80 for easier access on AWS
    depends_on:
      - db
      - mqtt
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/cattle_db
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - CHOKIDAR_USEPOLLING=true 
      - WATCHPACK_POLLING=true

volumes:
  postgres_data:
  mosquitto_data: