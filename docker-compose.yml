version: '3.8'

services:
  # 1. Reverse Proxy Gateway
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: always

  # 2. Centralized Spatial-Temporal Database Engine
  db:
    image: timescale/timescaledb-ha:pg15-oss
    container_name: spatial_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ktinoscare_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_secure_password
    ports:
      - "5432:5432"

  # 3. Enterprise Message Broker Ingestion Layer
  mqtt:
    image: emqx/emqx:5.7.0
    container_name: emqx_broker
    user: "root" 
    restart: always
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - emqx_data_vol:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Asynchronous Ingestion Telemetry Worker
  mqtt_worker:
    build: .
    container_name: mqtt_worker
    volumes:
      - .:/app
    command: python telemetry/mqtt_consumer.py
    restart: always
    depends_on:
      db:
        condition: service_started
      mqtt:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/ktinoscare_db
      - DJANGO_SECRET_KEY=django-insecure-your-hardcoded-fallback-secret-key-here
      - DEBUG=True
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER_HOST=mqtt
      - MQTT_BROKER_PORT=1883

  # 5. Core Django REST Application Server (with Hot-Reloading)
  web:
    build: .
    container_name: ktinoscare_web_app
    restart: always
    command: >
      sh -c "until nc -z db 5432; do echo 'Waiting for database...'; sleep 2; done &&
            python manage.py migrate &&
            python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - mqtt
    environment:
      - DATABASE_URL=postgres://admin:your_secure_password@db:5432/ktinoscare_db
      - DJANGO_SECRET_KEY=django-insecure-your-hardcoded-fallback-secret-key-here
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,d3dhvkckoyx2k8.cloudfront.net
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,https://d3dhvkckoyx2k8.cloudfront.net
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://localhost:3000,http://localhost:5173,https://d3dhvkckoyx2k8.cloudfront.net
      - REDIS_URL=redis://redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=ktinoscare.settings
      - AWS_ACCESS_KEY_ID=mock_local_key
      - AWS_SECRET_ACCESS_KEY=mock_local_secret
      - AWS_STORAGE_BUCKET_NAME=ktinoscare-telemetry-bucket

  # 6. Database Graphical Administration Console
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=your_pgadmin_password
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # 7. Asynchronous Caching & Redis Task Broker
  redis:
    image: redis:6-alpine
    container_name: redis
    restart: always
    ports:
      - "16379:6379"

volumes:
  postgres_data:
  emqx_data_vol: 
  pgadmin_data: